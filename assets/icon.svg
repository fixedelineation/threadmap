<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: brand dark with subtle radial -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background (maskable safe area: 410x410 centered) -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Thread: a curving route between three pins -->
  <g filter="url(#glow)">
    <path d="M 130 380 Q 200 260, 256 280 T 380 140"
          stroke="url(#thread)" stroke-width="14" fill="none"
          stroke-linecap="round" stroke-dasharray="4 16"/>
  </g>

  <!-- Pin 1 (small, indigo) bottom-left -->
  <g transform="translate(130 380)">
    <circle r="22" fill="#6366f1"/>
    <circle r="9" fill="#0a0a0f"/>
  </g>

  <!-- Pin 2 (medium, violet) middle -->
  <g transform="translate(256 280)">
    <circle r="26" fill="#8b5cf6"/>
    <circle r="11" fill="#0a0a0f"/>
  </g>

  <!-- Pin 3 (large, accent indigo) top-right - the destination -->
  <g transform="translate(380 140)">
    <circle r="44" fill="#6366f1" stroke="#a5b4fc" stroke-width="4"/>
    <circle r="18" fill="#0a0a0f"/>
    <circle r="8" fill="#a5b4fc"/>
  </g>
</svg>
